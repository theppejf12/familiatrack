<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamiliaTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e293b;
    --accent: #3b82f6;
    --accent2: #10b981;
    --text: #f1f5f9;
    --muted: #64748b;
  }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, #1e3a5f 0%, var(--bg) 70%);
  }
  .logo {
    font-size: 48px;
    margin-bottom: 8px;
  }
  .app-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .app-title span { color: var(--accent); }
  .app-sub {
    color: var(--muted);
    margin-bottom: 40px;
    font-size: 15px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
  }
  .card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn.green { background: var(--accent2); }
  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content:'';
    position:absolute;
    top:50%;
    width:40%;
    height:1px;
    background: var(--border);
  }
  .divider::before { left:0; }
  .divider::after { right:0; }

  /* MAIN APP */
  #app-screen { display:none; flex-direction:column; height:100vh; }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .header-title { font-weight:700; font-size:16px; }
  .group-badge {
    background: var(--accent);
    color: white;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(1.3); }
  }

  #map { flex:1; z-index:1; }

  /* MEMBERS PANEL */
  #members-panel {
    background: var(--card);
    border-top: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  .panel-title {
    padding: 10px 16px 4px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .member-item:hover { background: rgba(255,255,255,0.03); }
  .member-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .member-info { flex:1; min-width:0; }
  .member-name { font-size:14px; font-weight:600; }
  .member-time { font-size:11px; color:var(--muted); }
  .member-battery {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  /* SHARE PANEL */
  .share-btn {
    position: fixed;
    bottom: 220px;
    right: 16px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    z-index: 500;
    transition: transform 0.2s;
  }
  .share-btn:hover { transform: scale(1.1); }

  #share-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #share-modal.open { display:flex; }
  .modal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }
  .modal-card h3 { margin-bottom:16px; font-size:18px; }
  .link-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    color: var(--accent);
    word-break: break-all;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .close-btn {
    background: var(--border);
    color: var(--text);
    margin-top: 8px;
  }

  .leaflet-popup-content-wrapper {
    background: var(--card) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
  }
  .leaflet-popup-tip { background: var(--card) !important; }

  #loading {
    position: fixed; inset:0;
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px;
    z-index:9999;
  }
  .spinner {
    width:40px; height:40px;
    border:3px solid var(--border);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:14px;">Cargando...</span>
</div>

<!-- SETUP -->
<div id="setup-screen" style="display:none">
  <div class="logo">📍</div>
  <div class="app-title">Familia<span>Track</span></div>
  <p class="app-sub">Comparte tu ubicación con tu familia</p>

  <div class="card">
    <h2>Entrar al mapa familiar</h2>
    <label>Tu nombre</label>
    <input type="text" id="input-name" placeholder="Ej: Mamá, Juan..." maxlength="20"/>
    <label>Código de grupo</label>
    <input type="text" id="input-group" placeholder="Ej: familia123" maxlength="30"/>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">
      Todos con el mismo código se ven entre sí
    </p>
    <button class="btn" onclick="entrar()">📍 Entrar y compartir ubicación</button>
    <div class="divider">o</div>
    <button class="btn green" onclick="crearGrupo()">✨ Crear nuevo grupo</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="header-left">
      <span>📍</span>
      <span class="header-title">FamiliaTrack</span>
      <span class="group-badge" id="group-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status-dot"></div>
      <span style="font-size:12px;color:var(--muted)" id="my-name-label"></span>
    </div>
  </header>
  <div id="map"></div>
  <div id="members-panel">
    <div class="panel-title">👥 Miembros conectados</div>
    <div id="members-list"></div>
  </div>
</div>

<button class="share-btn" onclick="abrirShare()" title="Compartir enlace">🔗</button>

<div id="share-modal">
  <div class="modal-card">
    <h3>🔗 Compartir con familia</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">
      Envía este enlace para que otros se unan al grupo
    </p>
    <div class="link-box" id="share-link" onclick="copiarLink()">
      (generando enlace...)
    </div>
    <button class="btn" onclick="copiarLink()">📋 Copiar enlace</button>
    <button class="btn close-btn" onclick="cerrarShare()">Cerrar</button>
  </div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN FIREBASE
// Crea tu proyecto gratis en https://console.firebase.google.com
// y reemplaza estos valores
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyA2qHcspayrmMt_ujVOO8K_zlkzUn8uMSE",
  authDomain: "familier-c7c97.firebaseapp.com",
  databaseURL: "https://familier-c7c97-default-rtdb.firebaseio.com",
  projectId: "familier-c7c97",
  storageBucket: "familier-c7c97.firebasestorage.app",
  messagingSenderId: "145874933787",
  appId: "1:145874933787:web:2efa5f5ca114fe320dc0be"
};

// ============================================================
// COLORES PARA CADA MIEMBRO
const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
const EMOJIS = ['🔵','🟢','🟡','🔴','🟣','🩷','🩵','🟩'];

let map, db, groupRef;
let myId, myName, groupId;
let markers = {};
let memberColors = {};
let colorIndex = 0;
let watchId;

// Generar ID único
function genId() {
  return Math.random().toString(36).substr(2,9);
}

// Generar código de grupo aleatorio
function crearGrupo() {
  const words = ['luna','rio','sol','mar','paz','amor','casa','flor'];
  const w = words[Math.floor(Math.random()*words.length)];
  const n = Math.floor(Math.random()*900)+100;
  document.getElementById('input-group').value = w + n;
}

function entrar() {
  const name = document.getElementById('input-name').value.trim();
  const group = document.getElementById('input-group').value.trim().toLowerCase().replace(/\s+/g,'');
  if (!name) { alert('Escribe tu nombre'); return; }
  if (!group) { alert('Escribe un código de grupo'); return; }
  iniciarApp(name, group);
}

async function iniciarApp(name, group) {
  myName = name;
  groupId = group;
  myId = genId();

  // Guardar en URL para compartir fácil
  const url = new URL(window.location.href);
  url.searchParams.set('grupo', group);
  window.history.replaceState({}, '', url);

  // Init Firebase
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  } catch(e) {
    // Si ya está inicializado
    db = firebase.database();
  }

  // Mostrar app
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('group-label').textContent = group;
  document.getElementById('my-name-label').textContent = name;

  // Init mapa
  map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([4.7110, -74.0721], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  // Referencia Firebase
  groupRef = db.ref('grupos/' + group);

  // Escuchar cambios
  groupRef.on('value', snapshot => {
    const data = snapshot.val() || {};
    actualizarMiembros(data);
  });

  // Limpiar al salir
  window.addEventListener('beforeunload', () => {
    groupRef.child(myId).remove();
    if (watchId) navigator.geolocation.clearWatch(watchId);
  });

  // Obtener ubicación
  pedirUbicacion();
}

function pedirUbicacion() {
  if (!navigator.geolocation) {
    alert('Tu navegador no soporta geolocalización');
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude, longitude, accuracy } = pos.coords;
      const ahora = new Date();
      groupRef.child(myId).set({
        nombre: myName,
        lat: latitude,
        lng: longitude,
        accuracy: Math.round(accuracy),
        hora: ahora.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'}),
        ts: Date.now()
      });
    },
    err => {
      console.error(err);
      alert('No se pudo obtener ubicación. Asegúrate de dar permiso.');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
  );
}

function getColor(id) {
  if (!memberColors[id]) {
    memberColors[id] = COLORS[colorIndex % COLORS.length];
    colorIndex++;
  }
  return memberColors[id];
}

function createIcon(nombre, color, isMe) {
  const initial = nombre.charAt(0).toUpperCase();
  const size = isMe ? 44 : 36;
  const border = isMe ? `3px solid white` : `2px solid ${color}`;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;
      background:${color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:${border};
      box-shadow:0 3px 10px rgba(0,0,0,0.4);
      display:flex;align-items:center;justify-content:center;
    ">
      <span style="transform:rotate(45deg);color:white;font-weight:700;font-size:${isMe?16:13}px">${initial}</span>
    </div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size],
    popupAnchor: [0, -size]
  });
}

function actualizarMiembros(data) {
  const membersList = document.getElementById('members-list');
  membersList.innerHTML = '';

  // Actualizar markers y lista
  const ids = Object.keys(data);

  // Eliminar markers de quien se fue
  Object.keys(markers).forEach(id => {
    if (!ids.includes(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  ids.forEach(id => {
    const m = data[id];
    if (!m || !m.lat) return;
    const color = getColor(id);
    const isMe = id === myId;

    // Marker
    if (markers[id]) {
      markers[id].setLatLng([m.lat, m.lng]);
      markers[id].setIcon(createIcon(m.nombre, color, isMe));
    } else {
      markers[id] = L.marker([m.lat, m.lng], {
        icon: createIcon(m.nombre, color, isMe)
      }).addTo(map)
        .bindPopup(`<b>${m.nombre}</b><br>Actualizado: ${m.hora}<br>Precisión: ${m.accuracy}m`);
    }

    // Si soy yo, centrar mapa la primera vez
    if (isMe && !window._centered) {
      map.setView([m.lat, m.lng], 15);
      window._centered = true;
    }

    // Item en lista
    const item = document.createElement('div');
    item.className = 'member-item';
    item.innerHTML = `
      <div class="member-avatar" style="background:${color}20;color:${color}">
        ${m.nombre.charAt(0).toUpperCase()}
      </div>
      <div class="member-info">
        <div class="member-name">${m.nombre} ${isMe ? '(Tú)' : ''}</div>
        <div class="member-time">⏱ ${m.hora} · 📡 ±${m.accuracy}m</div>
      </div>
      <span style="font-size:18px">${isMe ? '🔵' : '📍'}</span>
    `;
    item.onclick = () => {
      map.setView([m.lat, m.lng], 17);
      markers[id].openPopup();
    };
    membersList.appendChild(item);
  });
}

function abrirShare() {
  const url = new URL(window.location.href);
  url.searchParams.set('grupo', groupId || '');
  document.getElementById('share-link').textContent = url.toString();
  document.getElementById('share-modal').classList.add('open');
}

function cerrarShare() {
  document.getElementById('share-modal').classList.remove('open');
}

function copiarLink() {
  const txt = document.getElementById('share-link').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    alert('✅ Enlace copiado. Envíalo por WhatsApp a tu familia.');
  }).catch(() => {
    alert('Copia este enlace:\n' + txt);
  });
}

// ============================================================
// INICIO
// ============================================================
window.addEventListener('load', () => {
  document.getElementById('loading').style.display = 'none';

  // Auto-rellenar grupo desde URL
  const params = new URLSearchParams(window.location.search);
  const grupoUrl = params.get('grupo');
  if (grupoUrl) {
    document.getElementById('input-group').value = grupoUrl;
  }

  document.getElementById('setup-screen').style.display = 'flex';
});
</script>
</body>
</html>
